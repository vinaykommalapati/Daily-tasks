<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Daily Tasks" />
  <title>Daily Tasks</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --border: #2a2a32;
      --accent: #7c6ff7;
      --accent-dim: #7c6ff720;
      --text: #e8e8f0;
      --muted: #6b6b7e;
      --done-text: #444455;
      --green: #4ade80;
      --red: #f87171;
      --radius: 14px;
      --font: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* Header */
    .header {
      padding: 56px 20px 20px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 4px;
    }

    .date-label {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .progress-wrap {
      margin-top: 14px;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .progress-label {
      font-size: 12px;
      color: var(--muted);
    }

    .progress-count {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
    }

    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* Reset banner */
    .reset-banner {
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin: 12px 16px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      display: none;
    }

    .reset-banner.show { display: flex; }

    .reset-banner span {
      font-size: 13px;
      color: var(--accent);
    }

    .reset-btn {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      background: none;
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 5px 12px;
      cursor: pointer;
    }

    /* Task list */
    .task-list {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .section-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 4px 4px;
    }

    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      padding: 14px 14px;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.2s, opacity 0.2s;
      user-select: none;
      position: relative;
    }

    .task-item:active { opacity: 0.7; }

    .task-item.done {
      border-color: #2a2a32;
      background: #14141a;
    }

    .task-item.done .task-text {
      color: var(--done-text);
      text-decoration: line-through;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .task-item.done .checkbox {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox svg {
      opacity: 0;
      transition: opacity 0.2s;
    }

    .task-item.done .checkbox svg { opacity: 1; }

    .task-text {
      flex: 1;
      font-size: 15px;
      color: var(--text);
      line-height: 1.4;
    }

    .delete-btn {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s;
      padding: 0;
    }

    .task-item:hover .delete-btn,
    .task-item.show-delete .delete-btn { opacity: 1; }

    .delete-btn:active { color: var(--red); }

    /* Add task area */
    .add-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      background: var(--bg);
      border-top: 1px solid var(--border);
    }

    .add-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .add-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 16px;
      font-size: 15px;
      color: var(--text);
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s;
    }

    .add-input::placeholder { color: var(--muted); }
    .add-input:focus { border-color: var(--accent); }

    .add-btn {
      width: 46px;
      height: 46px;
      background: var(--accent);
      border: none;
      border-radius: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    .add-btn:active { opacity: 0.8; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-text { font-size: 15px; }

    /* Bottom spacer for fixed add bar */
    .spacer { height: 100px; }

    /* Install hint */
    .install-hint {
      margin: 0 16px 8px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      display: none;
    }

    .install-hint.show { display: block; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="date-label" id="dateLabel"></div>
      <div class="page-title">Today's Tasks</div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-row">
      <span class="progress-label">Progress</span>
      <span class="progress-count" id="progressCount">0 / 0</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>
</div>

<div class="install-hint" id="installHint">
  📱 Add to Home Screen → Share → "Add to Home Screen" for app experience
</div>

<div class="reset-banner" id="resetBanner">
  <span>🌅 New day — reset all tasks?</span>
  <button class="reset-btn" onclick="resetForNewDay()">Reset</button>
</div>

<div class="task-list" id="taskList"></div>
<div class="spacer"></div>

<div class="add-area">
  <div class="add-row">
    <input
      class="add-input"
      id="addInput"
      type="text"
      placeholder="Add a task..."
      maxlength="120"
    />
    <button class="add-btn" onclick="addTask()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const STORAGE_KEY = 'daily_tasks_v2';
  const DATE_KEY = 'daily_tasks_date';

  let tasks = [];

  function todayStr() {
    return new Date().toDateString();
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      tasks = raw ? JSON.parse(raw) : [];
    } catch { tasks = []; }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    localStorage.setItem(DATE_KEY, todayStr());
  }

  function checkNewDay() {
    const savedDate = localStorage.getItem(DATE_KEY);
    if (savedDate && savedDate !== todayStr() && tasks.length > 0) {
      document.getElementById('resetBanner').classList.add('show');
    }
  }

  function resetForNewDay() {
    tasks = tasks.map(t => ({ ...t, done: false }));
    save();
    document.getElementById('resetBanner').classList.remove('show');
    render();
  }

  function addTask() {
    const input = document.getElementById('addInput');
    const text = input.value.trim();
    if (!text) return;
    tasks.push({ id: Date.now(), text, done: false });
    save();
    render();
    input.value = '';
    input.focus();
  }

  function toggleTask(id) {
    tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
    save();
    render();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  function render() {
    const list = document.getElementById('taskList');
    const pending = tasks.filter(t => !t.done);
    const done = tasks.filter(t => t.done);
    const total = tasks.length;
    const doneCount = done.length;

    // Progress
    document.getElementById('progressCount').textContent = `${doneCount} / ${total}`;
    document.getElementById('progressFill').style.width = total ? `${(doneCount / total) * 100}%` : '0%';

    if (total === 0) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">No tasks yet — add your first one below</div></div>`;
      return;
    }

    let html = '';

    if (pending.length > 0) {
      html += `<div class="section-label">To Do (${pending.length})</div>`;
      pending.forEach(t => {
        html += taskHTML(t);
      });
    }

    if (done.length > 0) {
      html += `<div class="section-label" style="margin-top:8px">Done (${done.length})</div>`;
      done.forEach(t => {
        html += taskHTML(t);
      });
    }

    list.innerHTML = html;
  }

  function taskHTML(t) {
    return `
      <div class="task-item ${t.done ? 'done' : ''}" onclick="toggleTask(${t.id})">
        <div class="checkbox">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="2,6 5,9 10,3"/>
          </svg>
        </div>
        <div class="task-text">${escHtml(t.text)}</div>
        <button class="delete-btn" onclick="event.stopPropagation(); deleteTask(${t.id})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    `;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setDateLabel() {
    const now = new Date();
    const opts = { weekday: 'long', month: 'long', day: 'numeric' };
    document.getElementById('dateLabel').textContent = now.toLocaleDateString('en-IN', opts);
  }

  // Enter key
  document.getElementById('addInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // Show install hint on mobile non-standalone
  if (window.navigator.standalone === false) {
    document.getElementById('installHint').classList.add('show');
  }

  // Init
  load();
  setDateLabel();
  checkNewDay();
  render();
</script>
</body>
</html>
